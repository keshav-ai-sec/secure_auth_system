<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a new account on Secure Auth System">
    <title>Register — Secure Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <!-- Animated background orbs -->
    <div class="bg-orbs"></div>

    <div class="auth-container">
        <div class="auth-card">

            <!-- Logo / Branding -->
            <div class="auth-card__logo">
                <span class="auth-card__logo-icon">🛡️</span>
                <h1>Create Account</h1>
                <p>Join the Secure Auth System</p>
            </div>

            <!-- Registration Form -->
            <form id="register-form" novalidate>

                <!-- Username Field -->
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="johndoe"
                            autocomplete="username"
                            required
                        >
                        <span class="input-icon">👤</span>
                    </div>
                    <span class="field-error" id="username-error"></span>
                </div>

                <!-- Email Field -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="you@example.com"
                            autocomplete="email"
                            required
                        >
                        <span class="input-icon">📧</span>
                    </div>
                    <span class="field-error" id="email-error"></span>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Min 6 chars with letters, numbers & symbols"
                            autocomplete="new-password"
                            required
                        >
                        <span class="input-icon">🔑</span>
                        <button type="button" class="toggle-password" id="toggle-password" aria-label="Toggle password visibility">
                            👁️
                        </button>
                    </div>
                    <!-- Password strength indicator -->
                    <div class="password-strength">
                        <div class="password-strength__bar"></div>
                        <div class="password-strength__bar"></div>
                        <div class="password-strength__bar"></div>
                        <div class="password-strength__bar"></div>
                    </div>
                    <div class="password-strength__label"></div>
                    <span class="field-error" id="password-error"></span>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary" id="btn-register">
                    <span class="spinner"></span>
                    <span class="btn-text">Create Account →</span>
                </button>

            </form>

            <!-- Footer -->
            <div class="auth-card__footer">
                Already have an account? <a href="/login.html">Sign in</a>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // ── Page Init ──────────────────────────────────────────────
        App.redirectIfLoggedIn();

        // ── DOM References ─────────────────────────────────────────
        const form = document.getElementById('register-form');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const btn = document.getElementById('btn-register');
        const toggleBtn = document.getElementById('toggle-password');

        // ── Password Visibility Toggle ─────────────────────────────
        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleBtn.textContent = isPassword ? '🙈' : '👁️';
        });

        // ── Live Password Strength ─────────────────────────────────
        passwordInput.addEventListener('input', () => {
            App.updatePasswordStrength(passwordInput.value);
        });

        // ── Client-Side Validation ─────────────────────────────────
        function validateForm() {
            let valid = true;

            // Username
            const userErr = document.getElementById('username-error');
            if (!usernameInput.value.trim()) {
                userErr.textContent = 'Username is required';
                userErr.classList.add('visible');
                usernameInput.classList.add('input-error');
                valid = false;
            } else if (usernameInput.value.trim().length < 3) {
                userErr.textContent = 'Username must be at least 3 characters';
                userErr.classList.add('visible');
                usernameInput.classList.add('input-error');
                valid = false;
            } else {
                userErr.classList.remove('visible');
                usernameInput.classList.remove('input-error');
            }

            // Email
            const emailErr = document.getElementById('email-error');
            if (!emailInput.value.trim()) {
                emailErr.textContent = 'Email is required';
                emailErr.classList.add('visible');
                emailInput.classList.add('input-error');
                valid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value)) {
                emailErr.textContent = 'Please enter a valid email';
                emailErr.classList.add('visible');
                emailInput.classList.add('input-error');
                valid = false;
            } else {
                emailErr.classList.remove('visible');
                emailInput.classList.remove('input-error');
            }

            // Password
            const passErr = document.getElementById('password-error');
            if (!passwordInput.value) {
                passErr.textContent = 'Password is required';
                passErr.classList.add('visible');
                passwordInput.classList.add('input-error');
                valid = false;
            } else if (passwordInput.value.length < 6) {
                passErr.textContent = 'Password must be at least 6 characters';
                passErr.classList.add('visible');
                passwordInput.classList.add('input-error');
                valid = false;
            } else if (!/(?=.*[a-zA-Z])(?=.*\d)(?=.*[@$!%*?&])/.test(passwordInput.value)) {
                passErr.textContent = 'Must contain letters, numbers, and a special character (@$!%*?&)';
                passErr.classList.add('visible');
                passwordInput.classList.add('input-error');
                valid = false;
            } else {
                passErr.classList.remove('visible');
                passwordInput.classList.remove('input-error');
            }

            return valid;
        }

        // Clear error on input
        [usernameInput, emailInput, passwordInput].forEach(input => {
            input.addEventListener('input', () => {
                const errEl = document.getElementById(input.id + '-error');
                errEl.classList.remove('visible');
                input.classList.remove('input-error');
            });
        });

        // ── Form Submission ────────────────────────────────────────
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validateForm()) return;

            App.setLoading(btn, true);

            try {
                const data = await API.post('/api/auth/register', {
                    username: usernameInput.value.trim(),
                    email: emailInput.value.trim(),
                    password: passwordInput.value,
                });

                if (data._ok && data.success) {
                    App.showToast('success', 'Account Created!', 'Redirecting to login...');

                    // Redirect to login so the user can sign in with their new account
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 1500);
                } else {
                    if (data._status === 409) {
                        App.showToast('error', 'Already Exists', data.error || 'A user with this email or username already exists');
                    } else if (data.errors && data.errors.length) {
                        data.errors.forEach(err => {
                            App.showToast('error', 'Validation Error', err.msg);
                        });
                    } else {
                        App.showToast('error', 'Registration Failed', data.error || 'Something went wrong');
                    }
                    App.setLoading(btn, false);
                }

            } catch (err) {
                App.showToast('error', 'Network Error', 'Could not reach the server. Is it running?');
                App.setLoading(btn, false);
            }
        });
    </script>

</body>
</html>
